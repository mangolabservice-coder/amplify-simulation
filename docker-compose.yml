version: "3.9"

# Qdrant is the vector database backend in the AMPLIFY architecture.
# We bring it up as a real service (matching the paper) rather than embedding it.
services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: amplify-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
