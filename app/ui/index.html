<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AMPLIFY-clone</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
    --good: #3fb950; --warn: #d29922; --bad: #f85149;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text);
               font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { padding: 12px 18px; border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header small { color: var(--muted); }
  .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px;
           border: 1px solid var(--border); }
  .badge.ext { color: var(--accent); border-color: var(--accent); }
  .badge.int { color: var(--good); border-color: var(--good); }
  main { display: grid; grid-template-columns: 1fr 380px; height: calc(100vh - 49px); }
  #chat { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  #log { flex: 1; overflow-y: auto; padding: 16px; }
  .msg { margin: 0 0 14px; padding: 10px 12px; border-radius: 8px;
         border: 1px solid var(--border); background: var(--panel); white-space: pre-wrap; }
  .msg.user { background: #1f2937; }
  .meta { color: var(--muted); font-size: 11px; margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
  #composer { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); }
  #composer textarea { flex: 1; resize: none; height: 60px; padding: 8px 10px;
                       background: var(--panel); color: var(--text);
                       border: 1px solid var(--border); border-radius: 6px; }
  #composer select, #composer button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
    cursor: pointer;
  }
  #composer button { background: var(--accent); color: #0e1116; font-weight: 600; }
  aside { overflow-y: auto; padding: 14px; }
  aside h2 { font-size: 12px; text-transform: uppercase; color: var(--muted);
             letter-spacing: 1px; margin: 14px 0 6px; }
  .cite, .span { padding: 8px; border: 1px solid var(--border);
                 border-radius: 6px; margin-bottom: 6px; background: var(--panel); }
  .cite small, .span small { color: var(--muted); }
  .span b { color: var(--accent); }
  .err { color: var(--bad); }
</style>
</head>
<body>
<header>
  <h1>AMPLIFY-clone</h1>
  <small>RAG · Model Router · MCP · Tracing</small>
  <span style="margin-left:auto"></span>
  <span id="backends"></span>
</header>

<main>
  <section id="chat">
    <div id="log"></div>
    <form id="composer" onsubmit="return send(event)">
      <textarea id="q" placeholder="Ask about the ingested corpus…"></textarea>
      <select id="route" title="Model Router override">
        <option value="">auto (router)</option>
        <option value="internal">force internal (Ollama)</option>
        <option value="external">force external (OpenAI)</option>
      </select>
      <button>Send</button>
    </form>
  </section>
  <aside>
    <h2>Citations</h2>
    <div id="citations"><small>—</small></div>
    <h2>Last trace</h2>
    <div id="trace"><small>—</small></div>
  </aside>
</main>

<script>
async function loadStatus() {
  const r = await fetch("/router/status").then(r => r.json());
  const el = document.getElementById("backends");
  el.innerHTML = Object.entries(r.available_backends || {}).map(
    ([k, m]) => `<span class="badge ${k==='external'?'ext':'int'}">${k}: ${m}</span>`
  ).join(" ") || `<span class="badge">no backends</span>`;
}
loadStatus();

function add(role, text, meta) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  if (meta) {
    const m = document.createElement("div");
    m.className = "meta";
    m.innerHTML = meta;
    div.appendChild(m);
  }
  document.getElementById("log").appendChild(div);
  div.scrollIntoView({behavior:"smooth"});
  return div;
}

async function send(ev) {
  ev.preventDefault();
  const q = document.getElementById("q").value.trim();
  if (!q) return false;
  const route = document.getElementById("route").value || null;
  document.getElementById("q").value = "";
  add("user", q);
  const pending = add("assistant", "…thinking…");
  try {
    const r = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({query: q, route}),
    });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    pending.textContent = data.answer;
    const meta = `<span class="badge ${data.routing.network==='external'?'ext':'int'}">`
      + `${data.routing.backend} · ${data.routing.model}</span>`
      + `<span>${data.routing.reason}</span>`
      + `<span>${data.latency_ms} ms</span>`;
    const m = document.createElement("div");
    m.className = "meta"; m.innerHTML = meta;
    pending.appendChild(m);
    renderCitations(data.citations);
    renderTrace(data.trace_id);
  } catch (e) {
    pending.innerHTML = `<span class="err">${e.message}</span>`;
  }
  return false;
}

function renderCitations(cits) {
  const el = document.getElementById("citations");
  if (!cits || !cits.length) { el.innerHTML = "<small>—</small>"; return; }
  el.innerHTML = cits.map(c =>
    `<div class="cite"><b>[${c.n}]</b> ${c.source}`
    + (c.page ? `, p.${c.page}` : "")
    + ` <small>score=${c.score}</small></div>`
  ).join("");
}

async function renderTrace(id) {
  const t = await fetch("/traces/" + id).then(r => r.json());
  const el = document.getElementById("trace");
  el.innerHTML = `<div class="span"><b>${t.name}</b> · ${t.latency_ms} ms</div>`
    + t.spans.map(s =>
      `<div class="span"><b>${s.name}</b> · ${s.duration_ms} ms`
      + (s.error ? `<br><span class="err">${s.error}</span>` : "")
      + `<br><small>${Object.entries(s.attributes).map(([k,v])=>`${k}=${JSON.stringify(v)}`).join(" · ")}</small>`
      + `</div>`
    ).join("");
}
</script>
</body>
</html>
